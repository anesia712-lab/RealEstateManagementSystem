services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: realestate-sql
    # Apple Silicon: emulate x64 (slower). Comment out on Intel Mac / Linux x64.
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "RealEstate_local_1"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P RealEstate_local_1 -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
